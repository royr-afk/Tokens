
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JSON Token Rendered HTML</title>

  <!-- Load Manrope -->
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap"
    rel="stylesheet"
  >

  <style>
    body {
      background: #f5f5f5;
      padding: 32px;
    }

    .card {
      background: white;
      padding: 24px;
      border-radius: 12px;
      max-width: 420px;
    }
  </style>
</head>
<body>

  <div id="app"></div>

  <script>
    // ✅ Your design token
    const token = {
      fontFamily: {
        base: "'Manrope', sans-serif"
      },
      font: {
        family: "manrope",
        weight: "600"
      }
    };

    // ✅ Rendered HTML using the token
    document.getElementById("app").innerHTML = `
      <div class="card" style="
        font-family: ${token.fontFamily.base};
        font-weight: ${token.font.weight};
      ">
        <h2>Design Token Render</h2>
        <p>
          This text is rendered using the
          <strong>${token.font.family}</strong> font
          with weight <strong>${token.font.weight}</strong>.
        </p>
      </div>
    `;
  </script>

</body>
</html>
